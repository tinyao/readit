name: Save Article

on:
  repository_dispatch:
    types: [save-article]
  workflow_dispatch:
    inputs:
      url:
        description: 'Article URL to save'
        required: true
        type: string

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Save article
        env:
          ARTICLE_URL: ${{ github.event.client_payload.url || inputs.url }}
        run: node scripts/save-article.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "save: add article"
          git pull --rebase
          git push || (git pull --rebase && git push)
